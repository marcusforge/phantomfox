// IMPORTANT: Start your code on the 2nd line.
// PhantomFox hardened AutoConfig profile

// Kill Telemetry
lockPref("toolkit.telemetry.enabled", false);
lockPref("toolkit.telemetry.unified", false);
lockPref("toolkit.telemetry.server", "data:,");
lockPref("toolkit.telemetry.archive.enabled", false);
lockPref("toolkit.telemetry.newProfilePing.enabled", false);
lockPref("toolkit.telemetry.shutdownPingSender.enabled", false);
lockPref("toolkit.telemetry.updatePing.enabled", false);
lockPref("toolkit.telemetry.bhrPing.enabled", false);
lockPref("toolkit.telemetry.firstShutdownPing.enabled", false);

// Security hardening
lockPref("app.normandy.enabled", false);
lockPref("app.normandy.api_url", "");
lockPref("app.shield.optoutstudies.enabled", false);
lockPref("network.cookie.cookieBehavior", 1);

// UI Hardening (Kill Top Sites)
lockPref("browser.newtabpage.activity-stream.feeds.topsites", false);
lockPref("browser.newtabpage.activity-stream.showTopSites", false);
lockPref("browser.newtabpage.activity-stream.feeds.snippets", false);
lockPref("browser.newtabpage.activity-stream.feeds.section.topstories", false);
lockPref("browser.newtabpage.activity-stream.feeds.discoverystreamfeed", false);
lockPref("browser.newtabpage.activity-stream.showSponsored", false);
lockPref("browser.newtabpage.activity-stream.showSponsoredTopSites", false);
lockPref("browser.newtabpage.activity-stream.default.sites", "");

// Force Dark Theme
lockPref("browser.theme.content-theme", 0);
lockPref("browser.theme.toolbar-theme", 0);
lockPref("extensions.activeThemeID", "firefox-compact-dark@mozilla.org");
// Allow extensions from distribution/extensions to be enabled automatically
lockPref("extensions.autoDisableScopes", 0);lockPref("extensions.autoDisableScopes", 0);
